<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hridoy Profile</title>
    <style>
        /* Background & Layout */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 400px;
            border: 3px solid #f1c40f; 
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
        }

        /* Profile Details */
        .profile-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .tiktok-id {
            color: #bbb;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .profile-img-container {
            margin: 0 auto 20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #f1c40f;
            overflow: hidden;
            box-shadow: 0 0 15px #f1c40f;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .description {
            font-size: 14px;
            line-height: 1.5;
            color: #ddd;
            margin-bottom: 30px;
        }

        /* Social Media Buttons */
        .social-title {
            color: #f1c40f;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn {
            display: block;
            text-decoration: none;
            color: white;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        .telegram { background-color: #2980b9; }
        .youtube { background-color: #c0392b; }
        .facebook { background-color: #1877f2; }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-title">ᶠᵒᵛ Hʀɪᴅᴏʏ︕</div>
        <div class="tiktok-id">TikTok: @017x09</div>

        <div class="profile-img-container">
            <img src="https://i.ibb.co.com/ns52T2ZL/image.png" alt="Hridoy Profile">
        </div>

        <p class="description">
            
            
            
        </p>

        <div class="social-title">Follow My Other Social Media</div>

        <a href="#" class="btn telegram">✈ Join Now Telegram</a>
        
        <a href="https://youtube.com/@redbot_xtr?si=ooR_W28pLlvDQsDE" target="_blank" class="btn youtube">▶ Subscribe Now YouTube</a>
        
        <a href="#" class="btn facebook">f Follow Now Facebook</a>
    </div>

</body>
</html>
