<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Studio Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        /* স্ক্রলিং পুরোপুরি বন্ধ করার জন্য */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #e0eafc, #cfdef3);
            color: #2d3436;
        }

        .card {
            width: 90%;
            max-width: 370px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-weight: 700;
            font-size: 24px;
            margin: 0 0 5px 0;
            color: #1e272e;
        }

        p { font-size: 12px; opacity: 0.6; margin: 0 0 25px 0; }

        .pay-info {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }

        .label-sm { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #7f8c8d; margin-bottom: 8px; display: block; }
        .num { font-size: 20px; font-weight: 700; color: #e84393; display: block; margin-bottom: 12px; }

        .btn-copy {
            background: #2d3436;
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-copy:active { transform: scale(0.95); }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 15px;
            border: none;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: inset 2px 2px 5px #babecc, inset -5px -5px 10px #ffffff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        input[type="file"] { font-size: 11px; cursor: pointer; color: #7f8c8d; }

        #preview {
            width: 70px; height: 70px; border-radius: 15px;
            object-fit: cover; margin: 0 auto 15px; display: none;
            border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        #sendBtn {
            width: 100%;
            background: #2d3436;
            color: white;
            padding: 15px;
            border-radius: 18px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.3s;
        }
        #sendBtn:hover { background: #000; }
        #sendBtn:disabled { background: #95a5a6; }

        #status { margin-top: 10px; font-size: 11px; font-weight: 600; display: none; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #2d3436; color: #fff; padding: 10px 20px; border-radius: 50px;
            font-size: 11px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Photo Studio</h1>
        <p>Ultra-Clean Editing Service</p>

        <div class="pay-info">
            <span class="label-sm">Send Money 10 BDT (Bkash/Nagad)</span>
            <span class="num" id="bkNum">01701370709</span>
            <button class="btn-copy" onclick="copyNum()">Copy Number</button>
        </div>

        <img id="preview" src="#">

        <input type="file" id="photo" accept="image/*" onchange="showPrev(event)">
        <input type="text" id="wa" placeholder="WhatsApp Number">
        <input type="text" id="pay" placeholder="Payment Last 4 Digits">

        <button id="sendBtn" onclick="submit()">Submit Order</button>
        <div id="status"></div>
    </div>

    <div id="toast" class="toast">নম্বর কপি হয়েছে!</div>

    <script>
        const BOT_TOKEN = '8656077538:AAHk5W9TqlrVNODNALFiO6bGpvkmnTYWYYY';
        const CHAT_ID = '8535841928';

        function copyNum() {
            navigator.clipboard.writeText('01701370709');
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function showPrev(e) {
            const r = new FileReader();
            r.onload = () => {
                document.getElementById('preview').src = r.result;
                document.getElementById('preview').style.display = 'block';
            }
            r.readAsDataURL(e.target.files[0]);
        }

        async function submit() {
            const photo = document.getElementById('photo').files[0];
            const wa = document.getElementById('wa').value;
            const pay = document.getElementById('pay').value;
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('status');

            if (!photo || !wa || !pay) { alert("সবগুলো পূরণ করুন!"); return; }

            btn.disabled = true;
            btn.innerText = "Sending...";
            status.style.display = "block";
            status.innerText = "বটে পাঠানো হচ্ছে...";

            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('document', photo);
            fd.append('caption', `🆕 NEW ORDER\n\n📱 WA: ${wa}\n💰 Digit: ${pay}`);

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: fd
                });
                if (res.ok) {
                    status.innerText = "✅ সফল হয়েছে!";
                    btn.innerText = "Done";
                    setTimeout(() => location.reload(), 2000);
                } else { throw new Error(); }
            } catch (e) {
                status.innerText = "❌ ভুল হয়েছে!";
                btn.disabled = false;
                btn.innerText = "Retry";
            }
        }
    </script>
</body>
</html>
