<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Topup Center</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: linear-gradient(90deg, #ff4b2b, #ff416c);
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .container {
            max-width: 500px;
            width: 90%;
            margin-top: 30px;
            background: #1e1e24;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2a2a32;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #ff4b2b;
        }

        .package-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .package-card {
            background: #2a2a32;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            text-align: center;
        }

        .package-card:hover {
            transform: translateY(-3px);
            background: #353540;
        }

        .package-card.selected {
            border-color: #ff4b2b;
            background: #353540;
        }

        .package-card h3 {
            margin: 0;
            font-size: 18px;
            color: #ffb400;
        }

        .package-card p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #bbb;
        }

        .order-btn {
            width: 100%;
            padding: 15px;
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .order-btn:hover {
            background: #ff416c;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <h1>FF DIAMOND STORE</h1>
    </header>

    <div class="container">
        <div class="input-group">
            <label for="player-id">Enter Player ID</label>
            <input type="number" id="player-id" placeholder="Ex: 123456789">
        </div>

        <label>Select Package</label>
        <div class="package-grid">
            <div class="package-card" onclick="selectPkg(this, 115, 85)">
                <h3>115 💎</h3>
                <p>85 BDT</p>
            </div>
            <div class="package-card" onclick="selectPkg(this, 240, 165)">
                <h3>240 💎</h3>
                <p>165 BDT</p>
            </div>
            <div class="package-card" onclick="selectPkg(this, 610, 410)">
                <h3>610 💎</h3>
                <p>410 BDT</p>
            </div>
            <div class="package-card" onclick="selectPkg(this, 1240, 820)">
                <h3>1240 💎</h3>
                <p>820 BDT</p>
            </div>
        </div>

        <button class="order-btn" onclick="submitOrder()">Confirm Order</button>
    </div>

    <script>
        let selectedAmount = 0;
        let selectedPrice = 0;

        function selectPkg(element, amount, price) {
            // Shob card theke 'selected' class remove kora
            let cards = document.querySelectorAll('.package-card');
            cards.forEach(c => c.classList.remove('selected'));

            // Click kora card-e 'selected' class add kora
            element.classList.add('selected');
            
            selectedAmount = amount;
            selectedPrice = price;
        }

        function submitOrder() {
            let pid = document.getElementById('player-id').value;

            if (!pid) {
                alert("Age Player ID daw!");
                return;
            }
            if (selectedAmount === 0) {
                alert("Ekta package select koro!");
                return;
            }

            // Order message
            let message = `Order Request:\n\nPlayer ID: ${pid}\nPackage: ${selectedAmount} Diamonds\nPrice: ${selectedPrice} BDT`;
            alert(message);
            
            // Tumi chaile ekhane WhatsApp-e redirection add korte paro
            // window.location.href = "https://wa.me/YOUR_NUMBER?text=" + encodeURIComponent(message);
        }
    </script>

</body>
</html>
