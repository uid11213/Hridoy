<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Photo Edit Service</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.25);
            --accent: #ff0055; /* বিকাশ/নগদ ব্র্যান্ড কালার মিক্স */
            --primary: #00f2fe;
            --secondary: #4facfe;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            background: #0a0a0c; /* ডিপ প্রিমিয়াম ব্যাকগ্রাউন্ড */
            overflow: hidden;
        }

        /* ৩ডি এনিমেটেড ব্যাকগ্রাউন্ড লিকুইড */
        .liquid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0a0a0c, #1a1a2e);
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        .blob2 {
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 15s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* মেইন প্রিমিয়াম কার্ড */
        .premium-card {
            position: relative;
            width: 90%;
            max-width: 420px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: #fff;
        }

        h1 {
            font-weight: 800;
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { font-size: 14px; opacity: 0.7; margin-bottom: 30px; font-weight: 300; }

        /* পেমেন্ট বক্স - স্মার্ট ডিজাইন */
        .pay-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .price-tag { color: var(--accent); font-weight: 800; font-size: 18px; display: block; margin-bottom: 5px; }
        .bkash-num { font-size: 24px; font-weight: 800; letter-spacing: 2px; display: block; margin-bottom: 15px; }

        .copy-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .copy-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.4); }

        /* ইনপুট স্টাইল */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 12px; opacity: 0.6; margin-left: 10px; display: block; margin-bottom: 5px; }
        
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            color: #fff;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--secondary); background: rgba(255,255,255,0.1); }

        /* কাস্টম ফাইল আপলোড বাটন */
        input[type="file"] { font-size: 12px; padding: 10px; cursor: pointer; }

        /* প্রিভিউ ইমেজ - ৩ডি লুক */
        #preview {
            width: 100px; height: 100px; border-radius: 20px;
            object-fit: cover; margin: 0 auto 20px; display: none;
            border: 2px solid var(--secondary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* প্রিমিয়াম সাবমিট বাটন */
        #sendBtn {
            width: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            color: white;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.5s;
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
            margin-top: 10px;
        }
        #sendBtn:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(79, 172, 254, 0.6); }
        #sendBtn:disabled { background: #444; cursor: not-allowed; box-shadow: none; transform: none; }

        /* সাকসেস মেসেজ */
        #status { margin-top: 15px; font-size: 12px; font-weight: 600; display: none; }

        .toast {
            position: fixed; bottom: 30px; background: #fff; color: #000;
            padding: 12px 30px; border-radius: 50px; font-weight: 700;
            display: none; animation: slideUp 0.5s forwards; z-index: 1000;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob"></div>
        <div class="blob2"></div>
    </div>

    <div class="premium-card">
        <h1>Photo Studio</h1>
        <p>Ultra-Premium Editing Service</p>

        <div class="pay-box">
            <span class="price-tag">Advance Fee: 10 BDT</span>
            <span class="bkash-num" id="bkashNum">01701370709</span>
            <button class="copy-btn" onclick="copyText()">Copy Number</button>
        </div>

        <img id="preview" src="#">

        <div class="input-group">
            <label>Upload High-Res Photo</label>
            <input type="file" id="photo" accept="image/*" onchange="showPreview(event)">
        </div>

        <div class="input-group">
            <label>WhatsApp Number</label>
            <input type="text" id="wa" placeholder="017xxxxxxxx">
        </div>

        <div class="input-group">
            <label>Payment Last 4 Digits</label>
            <input type="text" id="pay" placeholder="e.g. 5566">
        </div>

        <button id="sendBtn" onclick="submitOrder()">Place Order</button>
        <div id="status"></div>
    </div>

    <div id="toast" class="toast">Number Copied!</div>

    <script>
        const BOT_TOKEN = '8656077538:AAHk5W9TqlrVNODNALFiO6bGpvkmnTYWYYY';
        const CHAT_ID = '8535841928';

        function copyText() {
            navigator.clipboard.writeText('01701370709');
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function showPreview(e) {
            const r = new FileReader();
            r.onload = () => {
                const img = document.getElementById('preview');
                img.src = r.result;
                img.style.display = 'block';
            }
            r.readAsDataURL(e.target.files[0]);
        }

        async function submitOrder() {
            const photo = document.getElementById('photo').files[0];
            const wa = document.getElementById('wa').value;
            const pay = document.getElementById('pay').value;
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('status');

            if (!photo || !wa || !pay) {
                alert("Please complete all fields.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";
            status.style.display = "block";
            status.style.color = "#00f2fe";
            status.innerText = "🚀 Sending to Studio...";

            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('document', photo);
            fd.append('caption', `💎 NEW PREMIUM ORDER\n\n📱 WA: ${wa}\n💰 Last 4 Digits: ${pay}`);

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: fd
                });
                if (res.ok) {
                    status.innerText = "✅ Order Placed Successfully!";
                    status.style.color = "#00ff88";
                    btn.innerText = "Success";
                    setTimeout(() => location.reload(), 3000);
                } else { throw new Error(); }
            } catch (e) {
                status.innerText = "❌ Error. Try Again.";
                status.style.color = "#ff0055";
                btn.disabled = false;
                btn.innerText = "Retry";
            }
        }
    </script>
</body>
</html>
