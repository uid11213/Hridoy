<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.r Xyro Profile</title>
    <style>
        /* Background ebong Body set-up */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 400px;
            border: 3px solid #f1c40f; /* Holud border */
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
        }

        /* Profile Section */
        .profile-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .tiktok-id {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .profile-img-container {
            margin: 0 auto 20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #f1c40f;
            overflow: hidden;
            box-shadow: 0 0 15px #f1c40f;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .description {
            font-size: 14px;
            line-height: 1.4;
            color: #eee;
            margin-bottom: 30px;
        }

        /* Social Media Buttons */
        .social-title {
            color: #f1c40f;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .btn {
            display: block;
            text-decoration: none;
            color: white;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.03);
        }

        .telegram { background-color: #2980b9; }
        .youtube { background-color: #c0392b; }
        .facebook { background-color: #2980b9; }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-title">M.r Xyro</div>
        <div class="tiktok-id">TikTok: @ozxu738</div>

        <div class="profile-img-container">
            <img src="https://via.placeholder.com/150" alt="Profile Picture">
        </div>

        <p class="description">
            Hi, I am Xyro. I provide FF Proxy Server, Mobile Panel, Mod Menu, Glitch File Etc.
        </p>

        <div class="social-title">Follow My Other Social Media</div>

        <a href="#" class="btn telegram">✈ Join Now Telegram</a>
        <a href="#" class="btn youtube">▶ Subscribe Now YouTube</a>
        <a href="#" class="btn facebook">f Follow Now Facebook</a>
    </div>

</body>
</html>
