<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photo Editing Service</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
}

/* Container */
.container {
    max-width: 420px;
    margin: 30px auto;
    padding: 15px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Header */
h1 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 5px;
}

p {
    text-align: center;
    color: #555;
}

/* Payment */
.payment {
    background: #fff3f3;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 20px;
    text-align: center;
}

.number {
    font-weight: bold;
    font-size: 18px;
}

.copy-btn {
    margin-top: 8px;
    padding: 6px 12px;
    border: none;
    background: red;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #eee;
}

/* Button */
button.submit {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg,#007bff,#00c6ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Preview */
#preview {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
    display: none;
}

/* Status */
#status {
    margin-top: 15px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Photo Editing Service</h1>
<p>আপনার ছবি পাঠান ✨</p>

<div class="payment">
<p>10 টাকা Send Money করুন</p>
<div class="number" id="num">01701370709</div>
<button class="copy-btn" onclick="copy()">Copy</button>
</div>

<input type="file" id="file" onchange="preview(event)">
<img id="preview">

<input type="text" id="wa" placeholder="WhatsApp Number">
<input type="text" id="pay" placeholder="Payment Last 4 Digit">

<button class="submit" onclick="send()">Submit Order</button>

<div id="status"></div>

</div>
</div>

<script>
const BOT_TOKEN = "YOUR_BOT_TOKEN";
const CHAT_ID = "YOUR_CHAT_ID";

function copy(){
    navigator.clipboard.writeText(document.getElementById("num").innerText);
    alert("Copied!");
}

function preview(e){
    let reader = new FileReader();
    reader.onload = () => {
        let img = document.getElementById("preview");
        img.src = reader.result;
        img.style.display = "block";
    }
    reader.readAsDataURL(e.target.files[0]);
}

async function send(){
    let file = document.getElementById("file").files[0];
    let wa = document.getElementById("wa").value;
    let pay = document.getElementById("pay").value;
    let status = document.getElementById("status");

    if(!file || !wa || !pay){
        alert("সব তথ্য দিন!");
        return;
    }

    status.innerText = "Sending...";

    let formData = new FormData();
    formData.append("chat_id", CHAT_ID);
    formData.append("document", file);
    formData.append("caption", `New Order\nWA: ${wa}\nPay: ${pay}`);

    try {
        let res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`,{
            method: "POST",
            body: formData
        });

        if(res.ok){
            status.innerText = "✅ Order Sent!";
        } else {
            status.innerText = "❌ Failed!";
        }
    } catch {
        status.innerText = "❌ Error!";
    }
}
</script>

</body>
</html>
