<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Editing Service | পেমেন্ট ও সাবমিট</title>
    <style>
        :root { --primary: #007bff; --secondary: #6c757d; --success: #28a745; --danger: #dc3545; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }
        .container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); font-size: 26px; margin-bottom: 5px; }
        .header p { color: #666; font-size: 14px; }
        
        .card { background: #fff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 30px; border-top: 5px solid var(--primary); }
        
        /* Payment Section */
        .payment-info { background: #fff5f5; border: 1px solid #ffcccc; padding: 15px; border-radius: 12px; margin-bottom: 25px; }
        .payment-info h3 { margin-top: 0; font-size: 16px; color: var(--danger); text-align: center; }
        .copy-box { background: white; border: 2px solid #eee; padding: 10px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .number { font-weight: bold; font-size: 18px; color: #333; letter-spacing: 1px; }
        .copy-btn { background: var(--danger); color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        
        /* Form Styling */
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #555; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 20px; font-size: 15px; background: var(--light); transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: white; box-shadow: 0 0 8px rgba(0,123,255,0.1); }
        
        #preview { width: 100%; border-radius: 10px; display: none; margin-bottom: 20px; border: 2px solid #eee; }
        
        #sendBtn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #sendBtn:hover { background: #0056b3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,123,255,0.3); }
        #sendBtn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        
        .status-msg { margin-top: 20px; text-align: center; padding: 12px; border-radius: 10px; display: none; font-size: 14px; font-weight: 500; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Photo Editing Service</h1>
        <p>আপনার ছবি আমাদের পাঠান, আমরা তা আকর্ষণীয় করে দেব!</p>
    </div>

    <div class="card">
        <div class="payment-info">
            <h3>১. অগ্রিম পেমেন্ট করুন (১০ টাকা)</h3>
            <p style="font-size: 13px; text-align: center; color: #666; margin: 5px 0;">নিচের নম্বরে সেন্ড মানি করুন (বিকাশ/নগদ)</p>
            <div class="copy-box">
                <span class="number" id="bkashNum">01701370709</span>
                <button class="copy-btn" onclick="copyNumber()">COPY</button>
            </div>
        </div>

        <h3>২. তথ্য ও ছবি জমা দিন</h3>
        
        <label>যে ছবিটি এডিট করতে চান (Original File)</label>
        <img id="preview" src="#" alt="Preview">
        <input type="file" id="photoInput" accept="image/*" onchange="previewImage(event)">

        <label>আপনার হোয়াটসঅ্যাপ নম্বর</label>
        <input type="text" id="whatsapp" placeholder="উদা: 017xxxxxxxx">

        <label>পেমেন্টের লাস্ট ৪ ডিজিট</label>
        <input type="text" id="paymentDesc" placeholder="বিকাশ/নগদ ট্রানজেকশন লাস্ট ৪ ডিজিট">

        <button id="sendBtn" onclick="sendToTelegram()">অর্ডার সাবমিট করুন</button>
        <div id="statusMsg" class="status-msg"></div>
    </div>
</div>

<div id="toast" class="toast">নম্বরটি কপি করা হয়েছে!</div>

<script>
    const BOT_TOKEN = '8656077538:AAHk5W9TqlrVNODNALFiO6bGpvkmnTYWYYY'; 
    const CHAT_ID = '8535841928';

    function copyNumber() {
        const num = document.getElementById('bkashNum').innerText;
        navigator.clipboard.writeText(num).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });
    }

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('preview');
                output.src = reader.result;
                output.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    async function sendToTelegram() {
        const photoFile = document.getElementById('photoInput').files[0];
        const whatsapp = document.getElementById('whatsapp').value.trim();
        const paymentDesc = document.getElementById('paymentDesc').value.trim();
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('statusMsg');

        if (!photoFile || !whatsapp || !paymentDesc) {
            alert("দয়া করে ছবি এবং সব তথ্য প্রদান করুন।");
            return;
        }

        btn.disabled = true;
        btn.innerText = "অর্ডার যাচ্ছে...";
        status.style.display = "block";
        status.innerText = "ফাইলটি পাঠানো হচ্ছে, দয়া করে একটু অপেক্ষা করুন...";
        status.style.backgroundColor = "#fff3cd";
        status.style.color = "#856404";

        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('document', photoFile); // হাই কোয়ালিটির জন্য ডকুমেন্ট হিসেবে যাবে
        formData.append('caption', `🆕 নতুন এডিটিং অর্ডার!\n\n📱 WhatsApp: ${whatsapp}\n💰 পেমেন্ট ৪ ডিজিট: ${paymentDesc}`);

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                status.innerText = "✅ আপনার অর্ডারটি গ্রহণ করা হয়েছে! খুব দ্রুত হোয়াটসঅ্যাপে যোগাযোগ করা হবে।";
                status.style.backgroundColor = "#d4edda";
                status.style.color = "#155724";
                btn.innerText = "অর্ডার সফল হয়েছে";
                
                // Reset form
                setTimeout(() => { location.reload(); }, 5000);
            } else {
                throw new Error('Failed');
            }
        } catch (error) {
            status.innerText = "❌ কোনো সমস্যা হয়েছে। আবার চেষ্টা করুন।";
            status.style.backgroundColor = "#f8d7da";
            status.style.color = "#721c24";
            btn.disabled = false;
            btn.innerText = "আবার চেষ্টা করুন";
        }
    }
</script>

</body>
</html>
