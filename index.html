<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Submission</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; color: #1a73e8; font-size: 22px; margin-bottom: 20px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        label { font-weight: 600; color: #444; display: block; margin-bottom: 8px; margin-top: 15px; font-size: 14px; line-height: 1.4; }
        input[type="text"], input[type="file"], button { width: 100%; padding: 12px; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        input[type="text"] { border: 2px solid #ddd; transition: 0.3s; }
        input[type="text"]:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 5px rgba(26,115,232,0.2); }
        input[type="file"] { background: #fafafa; border: 1px dashed #bbb; cursor: pointer; }
        button { background: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 25px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background: #1557b0; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #preview { width: 100%; height: auto; border-radius: 8px; display: none; margin-bottom: 15px; border: 1px solid #ddd; }
        .status-msg { text-align: center; margin-top: 15px; font-size: 14px; font-weight: bold; display: none; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>আপনার ছবি সহ পেমেন্ট করুন</h2>
    
    <img id="preview" src="#" alt="Image Preview">
    
    <label for="photoInput">লেনদেনের স্ক্রিনশট সিলেক্ট করুন</label>
    <input type="file" id="photoInput" accept="image/*" onchange="previewImage(event)">

    <label for="whatsapp">WhatsApp নম্বর</label>
    <input type="text" id="whatsapp" placeholder="উদা: 017xxxxxxxx">

    <label for="paymentDesc">১০ টাকা সেন্ড মানি করুন <br><span style="color:#d9534f;">01701370709 (Bkash/Nagad)</span></label>
    <input type="text" id="paymentDesc" placeholder="নাম্বার এর লাস্ট ৪ ডিজিট">
    
    <button id="sendBtn" onclick="sendToTelegram()">সেন্ড করুন (Document)</button>
    <div id="statusMsg" class="status-msg"></div>
</div>

<script>
    const BOT_TOKEN = '8656077538:AAHk5W9TqlrVNODNALFiO6bGpvkmnTYWYYY'; 
    const CHAT_ID = '8535841928';

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('preview');
                output.src = reader.result;
                output.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    async function sendToTelegram() {
        const photoFile = document.getElementById('photoInput').files[0];
        const whatsapp = document.getElementById('whatsapp').value.trim();
        const paymentDesc = document.getElementById('paymentDesc').value.trim();
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('statusMsg');

        if (!photoFile || !whatsapp || !paymentDesc) {
            alert("সবগুলো তথ্য সঠিকভাবে পূরণ করুন।");
            return;
        }

        btn.disabled = true;
        btn.innerText = "পাঠানো হচ্ছে...";
        status.style.display = "block";
        status.innerText = "ফাইল আপলোড হচ্ছে, অপেক্ষা করুন...";
        status.style.color = "#856404";
        status.style.backgroundColor = "#fff3cd";

        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('document', photoFile); 
        formData.append('caption', `🔔 নতুন পেমেন্ট এসেছে\n\n📱 WhatsApp: ${whatsapp}\n💰 লাস্ট ৪ ডিজিট: ${paymentDesc}`);

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                status.innerText = "✅ সফলভাবে পাঠানো হয়েছে! আপনার সাথে দ্রুত যোগাযোগ করা হবে।";
                status.style.color = "#155724";
                status.style.backgroundColor = "#d4edda";
                btn.innerText = "সেন্ড করুন (Document)";
                btn.disabled = false;
                
                // Reset form
                document.getElementById('photoInput').value = '';
                document.getElementById('whatsapp').value = '';
                document.getElementById('paymentDesc').value = '';
                document.getElementById('preview').style.display = 'none';
            } else {
                throw new Error('Failed');
            }
        } catch (error) {
            status.innerText = "❌ পাঠানো যায়নি! ইন্টারনেটে সমস্যা হতে পারে।";
            status.style.color = "#721c24";
            status.style.backgroundColor = "#f8d7da";
            btn.disabled = false;
            btn.innerText = "আবার চেষ্টা করুন";
        }
    }
</script>

</body>
</html>
