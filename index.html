<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Edit Service</title>
    <style>
        body { background: url('https://source.unsplash.com/random/1600x900/?photography') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2); padding: 30px; width: 350px; color: white; text-align: center; }
        .bkash-box { background: rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px solid #fff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.9); }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .c-btn { background: #ff4757; color: white; }
        .s-btn { background: #1e90ff; color: white; }
        #preview { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; display: none; margin: 10px auto; border: 3px solid white; }
    </style>
</head>
<body>
    <div class="glass">
        <h2>Photo Magic</h2>
        <div class="bkash-box">
            <p style="margin:0 0 5px">বিকাশ করুন (১০ টাকা)</p>
            <b>01701370709</b><br><br>
            <button class="c-btn" onclick="copy()">Copy Number</button>
        </div>
        <img id="preview" src="#">
        <input type="file" id="photo" onchange="prev(event)">
        <input type="text" id="wa" placeholder="আপনার হোয়াটসঅ্যাপ">
        <input type="text" id="pay" placeholder="পেমেন্ট লাস্ট ৪ ডিজিট">
        <button class="s-btn" id="btn" onclick="send()">অর্ডার দিন</button>
    </div>
    <script>
        const T='8656077538:AAHk5W9TqlrVNODNALFiO6bGpvkmnTYWYYY',C='8535841928';
        function copy(){navigator.clipboard.writeText('01701370709');alert('কপি হয়েছে');}
        function prev(e){let r=new FileReader();r.onload=()=>{document.getElementById('preview').src=r.result;document.getElementById('preview').style.display='block'};r.readAsDataURL(e.target.files[0])}
        async function send(){
            let p=document.getElementById('photo').files[0],w=document.getElementById('wa').value,d=document.getElementById('pay').value,b=document.getElementById('btn');
            if(!p||!w||!d)return alert('সব লিখুন');
            b.disabled=true;b.innerText='পাঠানো হচ্ছে...';
            let f=new FormData();f.append('chat_id',C);f.append('document',p);f.append('caption',`অর্ডার\nWA: ${w}\nDigit: ${d}`);
            let res=await fetch(`https://api.telegram.org/bot${T}/sendDocument`,{method:'POST',body:f});
            if(res.ok){alert('সফল হয়েছে!');location.reload()}
        }
    </script>
</body>
</html>
