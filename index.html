<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#e0e5ec;
font-family:Arial;
}

.box{
width:300px;
padding:40px;
border-radius:20px;
background:#e0e5ec;
box-shadow:10px 10px 20px #a3b1c6,
           -10px -10px 20px #ffffff;
text-align:center;
}

input{
width:100%;
padding:15px;
margin:15px 0;
border:none;
outline:none;
border-radius:25px;
background:#e0e5ec;
box-shadow: inset 5px 5px 10px #a3b1c6,
            inset -5px -5px 10px #ffffff;
}

button{
padding:12px 30px;
border:none;
border-radius:25px;
background:#e0e5ec;
cursor:pointer;
box-shadow:5px 5px 10px #a3b1c6,
          -5px -5px 10px #ffffff;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="password" id="pass" placeholder="Enter Password">

<button onclick="login()">Sign In</button>

</div>

<script>

function login(){

var password = document.getElementById("pass").value;

if(password === "12345"){

window.location="home.html";

}else{

alert("Wrong Password");

}

}

</script>

</body>
</html>
