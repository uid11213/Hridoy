<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Messenger to Telegram</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; font-size: 20px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #0088cc; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #006699; }
        #preview { width: 100%; height: auto; border-radius: 6px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>ছবি ও তথ্য পাঠান</h2>
    
    <img id="preview" src="#" alt="Image Preview">
    
    <input type="file" id="photoInput" accept="image/*" onchange="previewImage(event)">
    <input type="text" id="phone" placeholder="ফোন নম্বর লিখুন">
    <input type="number" id="total" placeholder="টোটাল (টাকা)">
    
    <button onclick="sendToTelegram()">সেন্ড করুন</button>
</div>

<script>
    // আপনার বটের তথ্য এখানে দিন
    const BOT_TOKEN = 'আপনার_বট_টোকেন_এখানে_দিন'; 
    const CHAT_ID = 'আপনার_চ্যাট_আইডি_এখানে_দিন';

    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('preview');
            output.src = reader.result;
            output.style.display = 'block';
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    async function sendToTelegram() {
        const photoFile = document.getElementById('photoInput').files[0];
        const phone = document.getElementById('phone').value;
        const total = document.getElementById('total').value;

        if (!photoFile || !phone || !total) {
            alert("সবগুলো ঘর পূরণ করুন!");
            return;
        }

        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', photoFile);
        formData.append('caption', `নতুন ডাটা এসেছে:\n\n📱 ফোন: ${phone}\n💰 টোটাল: ${total}`);

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                alert("সফলভাবে পাঠানো হয়েছে!");
                location.reload(); // ফর্ম রিসেট করার জন্য
            } else {
                alert("পাঠানো যায়নি। টোকেন বা আইডি চেক করুন।");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("ইন্টারনেট কানেকশন চেক করুন।");
        }
    }
</script>

</body>
</html>
