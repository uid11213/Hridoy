<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #111; color: #0f0; font-family: monospace; padding: 20px; display: flex; justify-content: center; }
        .cyber-box { border: 2px solid #0f0; padding: 30px; border-radius: 0px; width: 100%; max-width: 350px; box-shadow: 0 0 15px #0f0; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #0f0; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        .copy { font-size: 18px; border: 1px dashed #0f0; padding: 10px; margin-bottom: 20px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>
    <div class="cyber-box">
        <h3 style="text-align: center;">PHOTO_EDIT_V1.0</h3>
        <div class="copy" onclick="navigator.clipboard.writeText('01701370709');alert('COPIED')">PAY: 01701370709</div>
        <input type="file" id="f">
        <input type="text" id="w" placeholder="WA_NUMBER">
        <input type="text" id="d" placeholder="LAST_4_DIGIT">
        <button id="b" onclick="send()">EXECUTE ORDER</button>
    </div>
    <script>
        async function send(){
            const T='8656077538:AAHk5W9TqlrVNODNALFiO6bGpvkmnTYWYYY',C='8535841928';
            let fi=document.getElementById('f').files[0],wa=document.getElementById('w').value,di=document.getElementById('d').value;
            if(!fi||!wa||!di) return alert('MISSING DATA');
            document.getElementById('b').innerText='UPLOADING...';
            let fd=new FormData();fd.append('chat_id',C);fd.append('document',fi);fd.append('caption',`NEW_ORDER\nWA:${wa}\nDIGIT:${di}`);
            await fetch(`https://api.telegram.org/bot${T}/sendDocument`,{method:'POST',body:fd});
            alert('SYSTEM_UPDATED_SUCCESS');location.reload();
        }
    </script>
</body>
</html>
